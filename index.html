<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Description" content=""Smart Browser using Gemini AI">
    <title>Gemini AI Browser</title>
    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body class="container py-5 max-w-lg">

    <h2 class="mb-4 text-center fw-bold text-primary">🧠 Smart Gemini Browser</h2>

    <div class="browser-window mx-auto" style="max-width: 800px;">
        <div class="browser-toolbar"> 
            <div class="input-group">
                <input id="userInput" placeholder="Ask anything (e.g., What is React?)..." class="form-control form-control-lg" type="text" autocomplete="off">
                <button id="micBtn" class="btn btn-outline-secondary px-3" title="Voice Search">🎤</button>
                <button id="askGemini" class="btn btn-primary px-4 fw-semibold">Search</button>
            </div>
        </div>

        <div id="result">
            <div class="text-muted text-center mt-5 fs-5">
                👋 Hello! Type or use the Mic to ask something.
            </div>
        </div>

        <div id="actionButtons" class="d-none bg-light p-3 border-top d-flex justify-content-end gap-2">
            <button id="copyBtn" class="btn btn-sm btn-outline-secondary">📋 Copy</button>
            <button id="shareBtn" class="btn btn-sm btn-outline-primary">↗️ Share</button>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>

</html>
